<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiteHear FmXm — Where All Your Music Is Played</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#FF7A18;
  --amber:#FFB347;
  --gold:#FFD27D;
  --bg:#0E0703;
  --bg2:#1A0B05;
  --bg3:#221208;
  --white:#F8F8F8;
  --muted:rgba(248,248,248,.45);
  --border:rgba(255,122,24,.18);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
  cursor:none;
}

/* CUSTOM CURSOR */
.cursor{
  position:fixed;
  width:12px;
  height:12px;
  background:var(--orange);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}

.cursor-ring{
  position:fixed;
  width:36px;
  height:36px;
  border:1.5px solid var(--orange);
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
  opacity:.5;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 48px;
  background:linear-gradient(180deg,rgba(14,7,3,.95) 0%,transparent 100%);
  backdrop-filter:blur(4px);
}

.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  letter-spacing:3px;
  background:linear-gradient(90deg,var(--orange),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.nav-logo span{
  color:var(--white);
  -webkit-text-fill-color:var(--white);
  opacity:.4;
  font-size:14px;
  letter-spacing:2px;
  vertical-align:middle;
  margin-left:4px;
}

.nav-links{
  display:flex;
  gap:32px;
  align-items:center;
}

.nav-links a{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  text-decoration:none;
  position:relative;
}

.nav-links a:hover{
  color:var(--white);
}

.nav-live{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,122,24,.12);
  border:1px solid var(--border);
  padding:7px 16px;
  border-radius:4px;
  color:var(--orange);
}

.live-dot{
  width:7px;
  height:7px;
  background:var(--orange);
  border-radius:50%;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(.7);}
}

/* HERO */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:120px 24px 80px;
}

#heroCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
}

.hero-grid{
  position:absolute;
  inset:0;
  background-image:
  linear-gradient(rgba(255,122,24,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,122,24,.04) 1px,transparent 1px);
  background-size:60px 60px;
  z-index:1;
}

.hero-glow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:900px;
  height:900px;
  background:radial-gradient(ellipse,rgba(255,122,24,.13) 0%,transparent 70%);
  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
  max-width:1000px;
}

.hero-h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(72px,12vw,160px);
  line-height:.9;
}

.hero-h1 .highlight{
  background:linear-gradient(135deg,var(--orange),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* DESKTOP FIX */
@media (min-width: 1024px){
  .hero-h1{
    font-size:150px;
  }
}

/* MOBILE */
@media (max-width:768px){
  body{
    cursor:auto;
  }

  .cursor,
  .cursor-ring{
    display:none;
  }

  nav{
    padding:16px 20px;
  }

  .nav-links{
    display:none;
  }

  .hero{
    padding:110px 20px 60px;
  }

  .hero-h1{
    font-size:72px;
  }
}
</style>
