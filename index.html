<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RiteHear FmXm — Where All Your Music Is Played</title>
<meta name="description" content="RiteHear FMXM - Live radio, podcasts, music and streaming for the culture.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#FF7A18;
  --amber:#FFB347;
  --gold:#FFD27D;
  --bg:#0E0703;
  --bg2:#1A0B05;
  --bg3:#221208;
  --white:#F8F8F8;
  --muted:rgba(248,248,248,.55);
  --border:rgba(255,122,24,.18);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
}

/* Desktop custom cursor only */
@media (min-width:769px){
  body{cursor:none;}
  .cursor,.cursor-ring{display:block;}
}
@media (max-width:768px){
  .cursor,.cursor-ring{display:none;}
}

.cursor{
  position:fixed;
  width:12px;
  height:12px;
  background:var(--orange);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}
.cursor-ring{
  position:fixed;
  width:36px;
  height:36px;
  border:1px solid var(--orange);
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
  opacity:.5;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 28px;
  background:linear-gradient(180deg,rgba(14,7,3,.95),transparent);
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;
  letter-spacing:2px;
  background:linear-gradient(90deg,var(--orange),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.links{
  display:flex;
  gap:26px;
}

.links a{
  text-decoration:none;
  color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:2px;
  font-size:14px;
  text-transform:uppercase;
}

.links a:hover{
  color:var(--white);
}

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:130px 20px 80px;
  position:relative;
  overflow:hidden;
}

#heroCanvas{
  position:absolute;
  inset:0;
}

.overlay{
  position:absolute;
  inset:0;
  background-image:
   linear-gradient(rgba(255,122,24,.04) 1px, transparent 1px),
   linear-gradient(90deg, rgba(255,122,24,.04) 1px, transparent 1px);
  background-size:60px 60px;
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:1100px;
}

.badge{
  display:inline-block;
  border:1px solid var(--border);
  background:rgba(255,122,24,.08);
  padding:8px 18px;
  letter-spacing:3px;
  font-size:12px;
  text-transform:uppercase;
  margin-bottom:28px;
}

.hero h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,11vw,160px);
  line-height:.9;
}

.hero .accent{
  background:linear-gradient(135deg,var(--orange),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:20px;
  color:var(--muted);
  letter-spacing:4px;
  text-transform:uppercase;
  font-family:'Barlow Condensed',sans-serif;
}

.divider{
  width:70px;
  height:2px;
  margin:28px auto;
  background:linear-gradient(90deg,var(--orange),var(--gold));
}

.cta{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:14px 24px;
  border-radius:4px;
  text-decoration:none;
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:700;
}

.primary{
  background:linear-gradient(135deg,var(--orange),#e85f00);
  color:#fff;
}

.outline{
  border:1px solid var(--border);
  color:#fff;
}

.now-playing{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(26,11,5,.9);
  border:1px solid var(--border);
  padding:14px 20px;
  border-radius:8px;
  min-width:320px;
  z-index:2;
}

section{
  max-width:1300px;
  margin:auto;
  padding:90px 20px;
}

.title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,7vw,72px);
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px;
}

.card h3{
  font-size:24px;
  margin-bottom:8px;
}

footer{
  border-top:1px solid var(--border);
  text-align:center;
  padding:40px 20px;
  color:var(--muted);
}

@media(max-width:768px){
  .links{display:none;}
  .hero h1{font-size:clamp(48px,16vw,90px);}
  .now-playing{
    width:calc(100% - 30px);
    min-width:auto;
  }
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="ring"></div>

<nav>
  <div class="logo">RiteHear FmXm</div>
  <div class="links">
    <a href="#">Radio</a>
    <a href="#">Podcasts</a>
    <a href="#">Music</a>
    <a href="#">Live</a>
    <a href="#">Creators</a>
  </div>
</nav>

<section class="hero">
<canvas id="heroCanvas"></canvas>
<div class="overlay"></div>

<div class="hero-content">
<div class="badge">Broadcasting Live Now</div>

<h1>
Where All<br>
Your <span class="accent">Music</span><br>
Is Played
</h1>

<div class="sub">Live Radio • Podcasts • Music • Video • Streaming</div>
<div class="divider"></div>

<div class="cta">
<a href="#" class="btn primary">Listen Live</a>
<a href="#" class="btn outline">Upload Content</a>
<a href="#" class="btn outline">Watch Live</a>
</div>
</div>

<div class="now-playing">
Now Playing — Late Night Frequencies • DJ Rite
</div>
</section>
